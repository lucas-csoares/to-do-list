# Banco de dados
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-ui
spring.datasource.url=jdbc:h2:mem:to-do-list
spring.datasource.username=lu
spring.datasource.password=123

# Hibernate
spring.application.name=to-do-list
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
server.servlet.application-display-name=to-do-list


## WebServer (rota acessível para a API)
server.servlet.context-path = /api

## Link H2: http://localhost:8080/api/h2-ui/
